# Deploys the API (Azure Functions, Node v4 model — api/ + server/) to the
# Flex Consumption Function App.
#
# Flex Consumption does not support publish profiles, so this authenticates
# with OIDC (federated identity — no stored credentials):
#   - Entra app 'gh-deploy-sales-proration' has a federated credential for
#     repo:RSM-D365-Sales/sales-proration:ref:refs/heads/main and Contributor
#     on the Function App.
#   - Repo secrets: AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID
#   - Repo variable: AZURE_FUNCTIONAPP_NAME (prorate-fn-wmv50)
#
# Function App settings (already configured): D365_CONFIG_MODE=env, D365_*,
# AUTH_TENANT_ID / AUTH_CLIENT_ID, CORS for https://www.rsmd365.com.

name: Deploy API to Azure Functions

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'server/**'
      - 'host.json'
      - 'package.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm test
      - run: npm prune --omit=dev
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: .
          remote-build: false
