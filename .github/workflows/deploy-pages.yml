# Deploys the static front-end (public/) to GitHub Pages.
#
# One-time repo setup:
#   Settings > Pages > Source: "GitHub Actions"
#   Settings > Pages > Custom domain: your domain (GitHub writes the CNAME);
#   at your DNS provider add a CNAME record pointing the (sub)domain at
#   <your-github-username>.github.io, then enable "Enforce HTTPS".
#
# Remember to set public/config.js (apiBase + Entra tenant/client ids) before
# the first deploy — those are public identifiers, safe to commit.

name: Deploy front-end to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
