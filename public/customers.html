<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Customers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/skin-editorial.css" />
  <link rel="stylesheet" href="styles/skin-enterprise.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="content">
      <header class="pagehead" id="pagehead"></header>
      <main class="main">
        <section id="kpis" class="kpis"></section>

        <h2 class="section-title">Customers</h2>
        <p class="section-sub">Priorities and open demand from the planning snapshot.</p>

        <div class="row filters">
          <label class="field">Search
            <input id="cf-search" type="text" placeholder="Name or account…" />
          </label>
          <label class="field">Priority
            <select id="cf-priority">
              <option value="">All priorities</option>
              <option value="1">P1</option>
              <option value="2">P2</option>
              <option value="3">P3</option>
              <option value="4">P4</option>
              <option value="5">P5</option>
            </select>
          </label>
          <label class="check">
            <input id="cf-needs" type="checkbox" />
            <span>Only customers with orders needing proration</span>
          </label>
          <span class="muted" id="cf-count"></span>
        </div>

        <div id="cust-wrap">
          <table id="cust-table" class="grid">
            <thead>
              <tr>
                <th>Customer</th><th>Location</th><th>Priority</th>
                <th class="num">Open lines</th><th class="num">Items</th>
                <th class="num">Requested qty</th><th>Status</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script src="js/vendor/msal-browser.min.js"></script>
  <script src="config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/app.js"></script>
  <script>renderCustomers();</script>
</body>
</html>
