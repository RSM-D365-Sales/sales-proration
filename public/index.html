<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Commodities</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" />
  <!-- Relative asset paths: the site must work at a domain root (localhost)
       AND under a subpath (www.rsmd365.com/sales-proration/). -->
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/skin-editorial.css" />
  <link rel="stylesheet" href="styles/skin-enterprise.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="content">
      <header class="pagehead" id="pagehead"></header>
      <main class="main">
        <section id="kpis" class="kpis"></section>

        <h2 class="section-title">Commodities</h2>
        <p class="section-sub">Pick a commodity to view items, demand, and run a proration.</p>
        <section id="cards" class="cards"></section>

        <div class="block" id="batches">
          <h2 class="section-title">Recent batches sent to D365</h2>
          <p class="section-sub">Approved allocations published to the proration queue.</p>
          <table id="batch-table" class="grid">
            <thead>
              <tr><th>Batch Id</th><th>Strategy</th><th>Commodity</th><th class="num">Lines</th><th>Sent (UTC)</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <!-- Self-hosted MSAL (pinned via npm) — no CDN dependency, demo-network safe. -->
  <script src="js/vendor/msal-browser.min.js"></script>
  <script src="config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/app.js"></script>
  <script>renderLanding();</script>
</body>
</html>
