<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Commodity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/skin-editorial.css" />
  <link rel="stylesheet" href="/styles/skin-enterprise.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="content">
      <header class="pagehead" id="pagehead"></header>
      <main class="main">
        <section id="kpis" class="kpis"></section>
        <section id="items"></section>

        <div id="prorate-panel" class="panel hidden">
          <h3>Run Proration — <span id="pp-item"></span></h3>
          <div class="row">
            <label class="field">Strategy
              <select id="pp-strategy">
                <option value="StraightLine">Straight-Line</option>
                <option value="Weighted" selected>Weighted (priority)</option>
                <option value="HistoryAware">History-Aware (future)</option>
              </select>
            </label>
            <label class="field hidden" id="pp-alpha-wrap">α (history weight)
              <input id="pp-alpha" type="number" step="0.1" min="0" max="2" value="0.5" />
            </label>
            <button id="pp-run" class="primary">Calculate</button>
          </div>

          <table id="pp-results" class="grid hidden">
            <thead>
              <tr>
                <th>Sales Order</th><th>Customer</th><th>Site</th><th>WH</th>
                <th class="num">Requested</th><th class="num">Allocated</th>
                <th class="num">Fill %</th><th class="num">Weight</th>
              </tr>
            </thead>
            <tbody></tbody>
            <tfoot>
              <tr>
                <th colspan="4">Totals</th>
                <th class="num" id="pp-req-total"></th>
                <th class="num" id="pp-alloc-total"></th>
                <th class="num" id="pp-fill-total"></th>
                <th></th>
              </tr>
            </tfoot>
          </table>

          <div class="row" id="pp-actions" style="display:none; margin-top:1.25rem">
            <button id="pp-approve" class="primary">Approve &amp; Send to D365</button>
            <span class="muted">Publishes a single batch message to <code>d365-proration-inbound</code>.</span>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://alcdn.msauth.net/browser/3.30.0/js/msal-browser.min.js"></script>
  <script src="/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/shell.js"></script>
  <script src="/js/icons.js"></script>
  <script src="/js/app.js"></script>
  <script>renderDetail();</script>
</body>
</html>
