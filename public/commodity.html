<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Commodity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/skin-editorial.css" />
  <link rel="stylesheet" href="styles/skin-enterprise.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="content">
      <header class="pagehead" id="pagehead"></header>
      <main class="main">
        <section id="kpis" class="kpis"></section>

        <div class="row filters" id="pp-controls">
          <label class="field">Strategy
            <select id="pp-strategy">
              <option value="StraightLine">Straight-Line</option>
              <option value="Weighted" selected>Weighted (priority)</option>
              <option value="HistoryAware">History-Aware (future)</option>
            </select>
          </label>
          <label class="field hidden" id="pp-alpha-wrap">α (history weight)
            <input id="pp-alpha" type="number" step="0.1" min="0" max="2" value="0.5" style="min-width:6rem" />
          </label>
          <button id="pp-run-all" class="primary">Prorate all items</button>
          <span class="muted" id="pp-summary"></span>
          <span class="spacer"></span>
          <button id="pp-approve" class="primary hidden">Approve &amp; Send to D365</button>
        </div>

        <section id="subs"></section>
        <section id="items"></section>
      </main>
    </div>
  </div>

  <script src="js/vendor/msal-browser.min.js"></script>
  <script src="config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/app.js"></script>
  <script>renderDetail();</script>
</body>
</html>
